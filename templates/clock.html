<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Current Time</title>
    <style>
        @font-face {
            font-family: 'segment7';
            src: url("/static/7segment.woff") format("woff");
        }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: #222;
            color: #fff;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
		.dashboard {
			position: absolute;
			opacity: 0;
			transition: opacity 0.8s ease;
		}

		.hero {
			display: inline-block;
			text-align: center;
		}

		.time {
			font-size: 15em;
			font-family: 'segment7', monospace;
			letter-spacing: 0.04em;
			white-space: nowrap;
		}

		.weather {
			margin-top: -2.2rem;    /* was 1rem */
			font-family: Arial, sans-serif;
			display: flex;
			flex-direction: column;
			align-items: center;
		}

		.weather-current {
			font-size: 6em;
			display: flex;
			align-items: center;
			gap: 0;
			margin-bottom: -0.3em;
		}

		.weather-icon {
			height: 1.3em;
			width: auto;
			margin-right: -0.35em;
			margin-top: 0.45em;
		}
		
		#weatherCondition {
			margin-left: 0.25em;
		}

		.weather-summary {
			font-family: Arial, sans-serif;
			font-size: 1.4em;
			margin-top: 0.3rem;
			text-align: center;
		}
    </style>
    <script>
        function updateTime() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes().toString().padStart(2, '0');
            hours = hours % 12;
            hours = hours ? hours : 12; // the hour '0' should be '12'
            let display = `${hours.toString().padStart(2, '0')}:${minutes}`;
            document.getElementById('time').textContent = display;
        }
        // Floating logic for the dashboard panel (clock plus weather)
        function startRandomFloat() {
            const dashboard = document.getElementById('dashboard');
            dashboard.style.position = 'absolute';
            function nextMove() {
                const vw = window.innerWidth;
                const vh = window.innerHeight;
                const rect = dashboard.getBoundingClientRect();
                const pad = 20;
                const maxLeft = vw - rect.width - pad;
                const maxTop = vh - rect.height - pad;
                const minLeft = pad;
                const minTop = pad;
                // Clamp to valid range (in case window is smaller than dashboard)
                const safeMaxLeft = Math.max(minLeft, maxLeft);
                const safeMaxTop = Math.max(minTop, maxTop);
                let newLeft, newTop, prevLeft, prevTop, dx, dy, distance, duration;
                do {
                    newLeft = Math.random() * (safeMaxLeft - minLeft) + minLeft;
                    newTop = Math.random() * (safeMaxTop - minTop) + minTop;
                    prevLeft = parseFloat(dashboard.style.left) || 0;
                    prevTop = parseFloat(dashboard.style.top) || 0;
                    dx = newLeft - prevLeft;
                    dy = newTop - prevTop;
                    distance = Math.sqrt(dx * dx + dy * dy);
                } while (distance < 10); // avoid picking the same spot
                const speed = 10; // px per second
                duration = distance / speed;
                dashboard.style.transition = `left ${duration}s cubic-bezier(0.4,0,0.2,1), top ${duration}s cubic-bezier(0.4,0,0.2,1), color 60s linear`;
                dashboard.style.left = `${newLeft}px`;
                dashboard.style.top = `${newTop}px`;
                // Always schedule next move after duration (minimum 1s)
                setTimeout(nextMove, Math.max(duration * 1000, 1000));
            }
            setTimeout(nextMove, 500);
        }

		function placeDashboardRandomly() {
			const panel = document.getElementById('dashboard');

			const pad = 20;
			const vw = window.innerWidth;
			const vh = window.innerHeight;
			const rect = panel.getBoundingClientRect();

			const maxLeft = Math.max(pad, vw - rect.width - pad);
			const maxTop = Math.max(pad, vh - rect.height - pad);

			const left = Math.random() * (maxLeft - pad) + pad;
			const top = Math.random() * (maxTop - pad) + pad;

			panel.style.left = `${left}px`;
			panel.style.top = `${top}px`;
		}

		function fadeMoveDashboard() {
			const dashboard = document.getElementById('dashboard');

			dashboard.style.opacity = '0';

			setTimeout(() => {
				placeDashboardRandomly();
				refreshWeather();
				dashboard.style.opacity = '1';
			}, 800);
		}

        // Weather fetch and update
		function iconUrl(icon) {
			if (!icon) return '';
			return `/static/images/weather/${icon}.svg?v=2`;
		}

		function updateWeather() {
			fetch('/weather')
				.then(r => r.json())
				.then(data => {
					const c = data.current;

					const icon = document.getElementById('weatherIcon');
					const temp = document.getElementById('weatherTemp');
					const condition = document.getElementById('weatherCondition');
					const weathersummary = document.getElementById('weatherSummary');

					icon.src = iconUrl(c.icon);
					icon.style.display = c.icon ? 'inline-block' : 'none';

					temp.textContent = c.temp !== null ? `${Math.round(c.temp)}°` : '--°';
					condition.textContent = c.condition || '';
					weathersummary.textContent = c.daily_summary || '';
				})
				.catch(() => {
					document.getElementById('weatherTemp').textContent = '--°';
					document.getElementById('weatherCondition').textContent = '';
					document.getElementById('weatherIcon').style.display = 'none';
					document.getElementById('weatherSummary').style.display = 'none';
				});
		}

        // On load, update weather and time
			window.onload = function () {
				updateTime();
				updateWeather();

			const dashboard = document.getElementById("dashboard");
			dashboard.style.opacity = "0";

			setTimeout(() => {
				placeDashboardRandomly();
				startColorTransition();
				document.getElementById("dashboard").style.opacity = "1";
			}, 1000);
		};

        setInterval(updateTime, 1000);
        setInterval(fadeMoveDashboard, 5 * 60 * 1000);

        // Color transition
        function randomColor() {
            // HSL: h=0-360, s=90-100, l=23-60
            const h = Math.floor(Math.random() * 361); // 0-360
            const s = 90 + Math.random() * 10;         // 90-100
            const l = 40 + Math.random() * 35;         // 40-75
            return `hsl(${h}, ${s}%, ${l}%)`;
        }
        function startColorTransition() {
            const clock = document.getElementById('time');
            let currentColor = window.getComputedStyle(clock).color;
            function nextColor() {
                const newColor = randomColor();

                clock.style.color = newColor;
                setTimeout(() => {
                    // After transition, set up for next
                    currentColor = newColor;
                    nextColor();
                }, 60000);
            }
            nextColor();
        }
    </script>
</head>
<body>
    <div class="dashboard" id="dashboard">
		<div class="hero">
			<div class="weather" id="weather">
				<div class="weather-current">
					<img id="weatherIcon" class="weather-icon" src="" alt="">
					<span id="weatherTemp">--°</span>
					<span id="weatherCondition" style="display:none;"></span>
				</div>
			</div>
			<div class="time" id="time">--:--</div>
			<div id="weatherSummary" class="weather-summary"></div>
		</div>
    </div>
</body>
</html>
