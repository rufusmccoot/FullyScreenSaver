<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Current Time</title>
    <style>
        @font-face {
            font-family: 'segment7';
            src: url("/static/7segment.woff") format("woff");
        }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: #222;
            color: #fff;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
		.dashboard {
			position: absolute;
			opacity: 0;
			transition: opacity 0.8s ease;
			z-index: 2;
		}

		.hero {
			display: inline-block;
			text-align: center;
		}

		.time {
			font-size: 15em;
			font-family: 'segment7', monospace;
			letter-spacing: 0.04em;
			white-space: nowrap;
		}

		.weather {
			margin-top: -2.2rem;    /* was 1rem */
			font-family: Arial, sans-serif;
			display: flex;
			flex-direction: column;
			align-items: center;
		}

		.weather-current {
			font-size: 6em;
			display: flex;
			align-items: center;
			gap: 0;
			margin-bottom: -0.3em;
		}

		.weather-icon {
			height: 1.3em;
			width: auto;
			margin-right: -0.35em;
			margin-top: 0.45em;
		}
		
		#weatherCondition {
			margin-left: 0.25em;
		}

		.weather-summary {
			font-family: Arial, sans-serif;
			font-size: 1.4em;
			margin-top: 0.3rem;
			text-align: center;
		}

	.moon-icon {
		height: 0.8em;
		width: auto;
		margin-left: 0.1em;
		vertical-align: middle;
		opacity: .9;
	}

	#rainCanvas {
		position: fixed;
		inset: 0;
		pointer-events: none;
		z-index: 1;
		opacity: 0;
		transition: opacity 1s ease;
	}

    </style>
    <script>
	
	let canvas;
	let ctx;
	let drops = [];

        function updateTime() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes().toString().padStart(2, '0');
            hours = hours % 12;
            hours = hours ? hours : 12; // the hour '0' should be '12'
            let display = `${hours.toString().padStart(2, '0')}:${minutes}`;
            document.getElementById('time').textContent = display;
        }

		function moonIcon(phase) {
			const p = parseFloat(phase); // 0.0–1.0

			// 0.00 -> 01
			// 0.50 -> 15
			// 1.00 -> 30
			const n = Math.max(1, Math.min(30, Math.floor(p * 30) + 1));

			return `/static/images/moonphase/${String(n).padStart(2, '0')}.webp`;
		}

		function placeDashboardRandomly() {
			const panel = document.getElementById('dashboard');

			const pad = 20;
			const vw = window.innerWidth;
			const vh = window.innerHeight;
			const rect = panel.getBoundingClientRect();

			const maxLeft = Math.max(pad, vw - rect.width - pad);
			const maxTop = Math.max(pad, vh - rect.height - pad);

			const left = Math.random() * (maxLeft - pad) + pad;
			const top = Math.random() * (maxTop - pad) + pad;

			panel.style.left = `${left}px`;
			panel.style.top = `${top}px`;
		}

		function fadeMoveDashboard() {
			const dashboard = document.getElementById('dashboard');

			dashboard.style.opacity = '0';

			setTimeout(() => {
				placeDashboardRandomly();
				updateWeather();
				dashboard.style.opacity = '1';
			}, 800);
		}

		function setRainOverlay(active) {
			document.getElementById("rainCanvas").style.opacity = active ? "1" : "0";
		}

        // Weather fetch and update
		function iconUrl(icon) {
			if (!icon) return '';
			return `/static/images/weather/${icon}.svg?v=2`;
		}

function animateRain() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = "rgba(200,220,255,.25)";
    ctx.lineWidth = 1;

    for (const d of drops) {
        ctx.beginPath();
        ctx.moveTo(d.x, d.y);
        ctx.lineTo(d.x - 4, d.y + d.len);
        ctx.stroke();

        d.y += d.speed;
        d.x -= d.speed * 0.2;

        if (d.y > canvas.height) {
            d.y = -20;
            d.x = Math.random() * canvas.width;
        }
    }

    requestAnimationFrame(animateRain);
}

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

function initRain() {
    canvas = document.getElementById("rainCanvas");
    ctx = canvas.getContext("2d");

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    for (let i = 0; i < 150; i++) {
        drops.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            len: 10 + Math.random() * 20,
            speed: 6 + Math.random() * 4
        });
    }

    animateRain();
}

		function updateWeather() {
			fetch('/weather')
				.then(r => r.json())
				.then(data => {
					const c = data.current;

					const weathericon = document.getElementById('weatherIcon');
					const moonicon = document.getElementById('moonIcon');
					const temp = document.getElementById('weatherTemp');
					const condition = document.getElementById('weatherCondition');
					const weathersummary = document.getElementById('weatherSummary');

					weathericon.src = iconUrl(c.icon);
					weathericon.style.display = c.icon ? 'inline-block' : 'none';

					// Only show moon if it's night, relies on HA sun.sun entity
					const isNight = c.sun_state === "below_horizon";
					moonicon.src = moonIcon(c.moon_phase);
					moonicon.style.display =
						(c.moon_phase != null && isNight) ? "inline-block" : "none";

					temp.textContent = c.temp !== null ? `${Math.round(c.temp)}°` : '--°';
					condition.textContent = c.condition || '';
					weathersummary.textContent = c.daily_summary || '';
					
					const isRaining =
						c.condition?.toLowerCase().includes("rain") ||
						c.icon?.toLowerCase().includes("rain");

					setRainOverlay(isRaining);
					// for testing // setRainOverlay(true);
				})
				.catch(() => {
					document.getElementById('weatherTemp').textContent = '--°';
					document.getElementById('weatherCondition').textContent = '';
					document.getElementById('weatherIcon').style.display = 'none';
					document.getElementById('weatherSummary').style.display = 'none';
					document.getElementById('moonIcon').style.display = 'none';
				});
		}

        // On load, update weather and time
			window.onload = function () {
				updateTime();
				updateWeather();
				initRain();


			const dashboard = document.getElementById("dashboard");
			dashboard.style.opacity = "0";

			setTimeout(() => {
				placeDashboardRandomly();
				startColorTransition();
				document.getElementById("dashboard").style.opacity = "1";
			}, 1000);
		};

        setInterval(updateTime, 1000);
        setInterval(fadeMoveDashboard, 5 * 60 * 1000);

        // Color transition
        function randomColor() {
            // HSL: h=0-360, s=90-100, l=23-60
            const h = Math.floor(Math.random() * 361); // 0-360
            const s = 90 + Math.random() * 10;         // 90-100
            const l = 40 + Math.random() * 35;         // 40-75
            return `hsl(${h}, ${s}%, ${l}%)`;
        }
        function startColorTransition() {
            const clock = document.getElementById('time');
            let currentColor = window.getComputedStyle(clock).color;
            function nextColor() {
                const newColor = randomColor();

                clock.style.color = newColor;
                setTimeout(() => {
                    // After transition, set up for next
                    currentColor = newColor;
                    nextColor();
                }, 60000);
            }
            nextColor();
        }
    </script>
</head>
<body>
	<canvas id="rainCanvas"></canvas>
    <div class="dashboard" id="dashboard">
		<div class="hero">
			<div class="weather" id="weather">
				<div class="weather-current">
					<img id="weatherIcon" class="weather-icon" src="" alt="">
					<span id="weatherTemp">--°</span>
					<img id="moonIcon" class="moon-icon" src="" alt="">
					<span id="weatherCondition" style="display:none;"></span>
				</div>
			</div>
			<div class="time" id="time">--:--</div>
			<div id="weatherSummary" class="weather-summary"></div>
		</div>
    </div>
</body>
</html>
